services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - ./seed.js:/docker-entrypoint-initdb.d/seed.js:ro
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodata:
